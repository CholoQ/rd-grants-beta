<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>研究開発資金探索 β版</title>
    <style>
      :root {
        --bg: #f7f8fc;
        --card: rgba(255,255,255,0.92);
        --line: #e5e7f0;
        --text: #1e2746;
        --muted: #66708b;
        --primary: #6f63ff;
        --primary-2: #8d7bff;
        --shadow: 0 18px 50px rgba(42, 52, 95, 0.10);
      }

      * { box-sizing: border-box; }
      html { scroll-behavior: smooth; }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, #eef1ff 0, transparent 28%),
          radial-gradient(circle at top right, #f7ecff 0, transparent 22%),
          var(--bg);
      }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 32px 20px 72px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        background: #eceaff;
        color: #5147d9;
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 13px;
        font-weight: 700;
      }

      .card {
        background: var(--card);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(229,231,240,0.92);
        border-radius: 28px;
        box-shadow: var(--shadow);
      }

      .hero {
        padding: 40px 32px;
        text-align: left;
      }

      h1 {
        font-size: clamp(34px, 6vw, 56px);
        line-height: 1.08;
        margin: 18px 0 16px;
        letter-spacing: -0.03em;
      }

      .lead {
        font-size: 18px;
        line-height: 1.8;
        color: var(--muted);
        margin: 0 0 16px;
      }

      .meta {
        color: var(--muted);
        font-size: 14px;
        line-height: 1.8;
        margin: 0;
      }

      .section {
        margin-top: 24px;
      }

      .beta {
        padding: 28px;
      }

      .beta h2 {
        margin: 12px 0 10px;
        font-size: 28px;
      }

      .beta p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.8;
      }

      form {
        display: grid;
        gap: 12px;
      }

      .input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 16px;
        padding: 14px 15px;
        font: inherit;
        color: var(--text);
      }

      textarea {
        min-height: 110px;
        resize: vertical;
      }

      .btn {
        appearance: none;
        border: 0;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 14px 18px;
        border-radius: 16px;
        font-weight: 800;
        font-size: 15px;
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--primary), var(--primary-2));
        color: #fff;
        box-shadow: 0 12px 24px rgba(111,99,255,0.25);
      }

      footer {
        margin-top: 22px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.8;
      }

      @media (max-width: 640px) {
        .hero,
        .beta {
          padding: 24px 20px;
        }

        .btn {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="card hero">
        <span class="pill">限定公開β版</span>
        <h1>研究開発資金を、<br />探しやすく。</h1>
        <p class="lead">
          Jグランツ、NEDO、JST、AMEDの公募情報を横断して、
          自社に近い候補を見つけやすくするサービスです。
        </p>
        <p class="meta">
          研究開発型スタートアップ・中小企業向け / Jグランツ・NEDO・JST・AMED対応
        </p>
      </section>

      <section class="section card beta" id="beta">
        <span class="pill">限定公開に参加する</span>
        <h2>まずは使ってみてください</h2>
        <p>
          まだβ版です。実際に触ってもらいながら改善しています。
        </p>

        <form>
          <input class="input" type="text" placeholder="お名前" />
          <input class="input" type="email" placeholder="メールアドレス" />
          <input class="input" type="text" placeholder="所属 / 会社名" />
          <textarea placeholder="探したい公募や使う立場があれば教えてください"></textarea>
          <button class="btn btn-primary" type="button">限定公開に参加する</button>
        </form>
      </section>

      <footer>
        本サービスは公募情報の整理・探索・比較を支援するβ版です。最終確認は公式の公募要領・募集要項で行ってください。
      </footer>
    </div>
  </body>
</html>
